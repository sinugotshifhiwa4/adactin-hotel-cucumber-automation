# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - uat
          - preprod
          - prod
      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
      tags:
        description: 'Cucumber tags'
        required: true
        default: '@regression'
        type: choice
        options:
          - '@regression'
          - '@sanity'

jobs:
  test:
    runs-on: ubuntu-latest
    environment: DEV  # links to your GitHub DEV environment

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Tests
        env:
          CI_PORTAL_BASE_URL: ${{ vars.CI_PORTAL_BASE_URL }}
          CI_PORTAL_USERNAME: ${{ vars.CI_PORTAL_USERNAME }}
          CI_PORTAL_PASSWORD: ${{ secrets.CI_PORTAL_PASSWORD }}
        run: >
          mvn clean verify -Pgeneral-user
          -DENV=${{ github.event.inputs.env || 'dev' }}
          -Dtags="${{ github.event.inputs.tags || '@regression' }}"
          -Dbrowser=${{ github.event.inputs.browser || 'chrome' }}

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: target/allure-results

      - name: Publish Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6