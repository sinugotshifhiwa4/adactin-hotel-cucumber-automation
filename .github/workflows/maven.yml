name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - qa
          - uat
          - preprod
          - prod
      browser:
        description: 'Browser'
        required: true
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox
          - edge
      tags:
        description: 'Cucumber tags'
        required: true
        default: '@regression'
        type: choice
        options:
          - '@regression'
          - '@sanity'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    environment: DEV

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4.2.3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Download dependencies
        run: mvn dependency:go-offline -Pgeneral-user -q

      - name: Run Tests
        env:
          CI_PORTAL_BASE_URL: ${{ vars.CI_PORTAL_BASE_URL }}
          CI_PORTAL_USERNAME: ${{ vars.CI_PORTAL_USERNAME }}
          CI_PORTAL_PASSWORD: ${{ secrets.CI_PORTAL_PASSWORD }}
        run: >
          mvn clean verify -Pgeneral-user
          -DENV=${{ github.event.inputs.env || 'dev' }}
          -Dtags="${{ github.event.inputs.tags || '@regression' }}"
          -Dbrowser=${{ github.event.inputs.browser || 'chrome' }}

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: target/allure-results
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      - name: Add .nojekyll
        if: always()
        run: |
          sudo touch allure-history/.nojekyll
          sudo chmod 644 allure-history/.nojekyll

      - name: Publish Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4.0.0
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          enable_jekyll: false

      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v4.1.2